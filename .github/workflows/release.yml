name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5
      - name: Build
        env:
          USE_CROSS: ${{ matrix.cross }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --locked --target "$TARGET"
          else
            cargo build --release --locked --target "$TARGET"
          fi
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$TARGET/release"
          chmod +x local-memory-mcp
          tar czf "../../../local-memory-mcp-$TARGET.tar.gz" local-memory-mcp
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: local-memory-mcp-${{ matrix.target }}
          path: local-memory-mcp-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true
      - name: Verify artifacts
        run: |
          count=$(ls -1 *.tar.gz 2>/dev/null | wc -l)
          echo "Found $count artifact(s)"
          [ "$count" -eq 3 ] || { echo "::error::Expected 3 artifacts, found $count"; exit 1; }
      - name: Checksums
        run: sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release delete "$TAG" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create "$TAG" --draft --generate-notes --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" *.tar.gz SHA256SUMS.txt --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
